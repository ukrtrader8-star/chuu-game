<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💥 Взрывной Чууу</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:    #0a0c14;
    --bg2:   #0f1220;
    --bg3:   #161b2e;
    --green: #00e676;
    --red:   #ff3d57;
    --yellow:#ffd600;
    --pink:  #ff6bc8;
    --blue:  #448aff;
    --white: #e8edf5;
    --dim:   #4a5568;
    --dim2:  #718096;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Space Grotesk', sans-serif;
    display: flex; flex-direction: column;
    height: 100vh; user-select: none;
  }

  /* ── HEADER ── */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 20px;
    background: var(--bg2);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Nunito', sans-serif;
    font-size: 20px; font-weight: 900;
    letter-spacing: -0.5px;
  }
  .logo .boom { color: var(--red); }
  .logo .chuu { color: var(--yellow); }

  .balance-wrap {
    display:flex; align-items:center; gap:8px;
    background: var(--bg3);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 7px 14px; border-radius: 8px;
  }
  .balance-label { font-size:10px; color:var(--dim2); letter-spacing:1px; text-transform:uppercase; }
  .balance-amount { font-family:'Space Mono',monospace; font-size:15px; font-weight:700; color:var(--yellow); }

  /* ── HISTORY ── */
  .history-bar {
    display:flex; gap:6px; padding:7px 16px;
    background: var(--bg2);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    overflow-x:auto; scrollbar-width:none; flex-shrink:0;
  }
  .history-bar::-webkit-scrollbar { display:none; }
  .hist-pill {
    flex-shrink:0; font-family:'Space Mono',monospace;
    font-size:12px; font-weight:700; padding:3px 10px; border-radius:20px;
  }
  .hist-low  { background:rgba(255,61,87,0.15);  color:var(--red);    border:1px solid rgba(255,61,87,0.3); }
  .hist-mid  { background:rgba(0,230,118,0.12);  color:var(--green);  border:1px solid rgba(0,230,118,0.3); }
  .hist-high { background:rgba(255,214,0,0.12);  color:var(--yellow); border:1px solid rgba(255,214,0,0.3); }
  .hist-epic { background:rgba(255,107,200,0.15);color:var(--pink);   border:1px solid rgba(255,107,200,0.3); }

  /* ── MAIN ── */
  .main {
    flex:1; display:grid;
    grid-template-columns: 1fr 300px;
    overflow:hidden; min-height:0;
  }

  /* ── CANVAS AREA ── */
  .canvas-area { position:relative; overflow:hidden; background:var(--bg); }
  canvas { position:absolute; inset:0; width:100%; height:100%; }

  /* Multiplier */
  .mult-display {
    position:absolute; top:16px; left:50%; transform:translateX(-50%);
    text-align:center; pointer-events:none; transition:opacity 0.2s;
    z-index: 10;
  }
  .mult-value {
    font-family:'Space Mono',monospace;
    font-size: clamp(40px,6vw,72px);
    font-weight:700; line-height:1; letter-spacing:-2px;
    text-shadow: 0 0 30px currentColor;
    transition: color 0.15s;
  }
  .mult-label { font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--dim2); margin-top:4px; }

  /* Crash overlay */
  .crash-overlay {
    position:absolute; inset:0;
    background:rgba(255,61,87,0.06);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 0.3s; z-index:20;
  }
  .crash-overlay.show { opacity:1; }
  .crash-title {
    font-family:'Nunito',sans-serif; font-size:clamp(48px,8vw,88px); font-weight:900;
    color:var(--red); letter-spacing:-2px;
    text-shadow: 0 0 60px rgba(255,61,87,0.7);
    animation: boomShake 0.5s ease;
  }
  .crash-sub { font-family:'Space Mono',monospace; font-size:clamp(18px,2.5vw,28px); color:rgba(255,61,87,0.65); margin-top:6px; }
  @keyframes boomShake {
    0%,100%{transform:scale(1) rotate(0)}
    15%{transform:scale(1.3) rotate(-3deg)}
    30%{transform:scale(0.9) rotate(3deg)}
    45%{transform:scale(1.15) rotate(-2deg)}
    60%{transform:scale(0.95) rotate(1deg)}
  }

  /* Waiting overlay */
  .waiting-overlay {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
    opacity:0; pointer-events:none; transition:opacity 0.3s; z-index:15;
  }
  .waiting-overlay.show { opacity:1; }
  .wait-label { font-size:13px; letter-spacing:3px; text-transform:uppercase; color:var(--dim2); }
  .wait-countdown {
    font-family:'Nunito',sans-serif; font-size:64px; font-weight:900;
    color:var(--white); letter-spacing:-3px;
    animation: countPulse 1s ease infinite;
  }
  @keyframes countPulse {
    0%,100%{transform:scale(1)} 50%{transform:scale(1.1)}
  }

  /* Win flash */
  .win-flash {
    position:absolute; top:16px; left:50%; transform:translateX(-50%);
    background:rgba(0,230,118,0.15); border:1px solid rgba(0,230,118,0.4);
    padding:10px 24px; border-radius:8px;
    font-family:'Space Mono',monospace; font-size:18px; font-weight:700; color:var(--green);
    opacity:0; pointer-events:none; transition:opacity 0.3s; white-space:nowrap; z-index:30;
  }
  .win-flash.show { opacity:1; }

  /* ── SIDE PANEL ── */
  .side-panel {
    background:var(--bg2); border-left:1px solid rgba(255,255,255,0.06);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .bet-controls { padding:16px; border-bottom:1px solid rgba(255,255,255,0.06); flex-shrink:0; }
  .panel-label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--dim2); margin-bottom:10px; font-weight:600; }

  .bet-input-row {
    display:flex; align-items:center;
    background:var(--bg3); border:1px solid rgba(255,255,255,0.08);
    border-radius:8px; overflow:hidden; margin-bottom:10px;
  }
  .bet-input-row button {
    background:none; border:none; color:var(--dim2); font-size:20px;
    padding:0 14px; height:44px; cursor:pointer; transition:color 0.2s;
    font-family:'Space Mono',monospace;
  }
  .bet-input-row button:hover { color:var(--white); }
  .bet-input {
    flex:1; background:none; border:none; color:var(--white);
    font-family:'Space Mono',monospace; font-size:18px; font-weight:700;
    text-align:center; outline:none; width:0;
  }

  .quick-bets { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:12px; }
  .quick-bet {
    background:var(--bg3); border:1px solid rgba(255,255,255,0.07); color:var(--dim2);
    font-family:'Space Mono',monospace; font-size:11px; font-weight:700;
    padding:7px 4px; border-radius:6px; cursor:pointer; text-align:center; transition:all 0.15s;
  }
  .quick-bet:hover { border-color:rgba(255,255,255,0.2); color:var(--white); }

  .auto-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .auto-label { font-size:11px; color:var(--dim2); flex:1; }
  .auto-input {
    background:var(--bg3); border:1px solid rgba(255,255,255,0.08); border-radius:6px;
    color:var(--white); font-family:'Space Mono',monospace; font-size:13px; font-weight:700;
    padding:6px 10px; width:72px; text-align:center; outline:none;
  }
  .toggle {
    width:36px; height:20px; background:var(--dim); border-radius:10px;
    position:relative; cursor:pointer; transition:background 0.2s; flex-shrink:0; border:none;
  }
  .toggle::after {
    content:''; position:absolute; width:14px; height:14px; background:var(--white);
    border-radius:50%; top:3px; left:3px; transition:transform 0.2s;
  }
  .toggle.on { background:var(--green); }
  .toggle.on::after { transform:translateX(16px); }

  .bet-btn {
    width:100%; height:54px; border:none; border-radius:10px;
    font-family:'Nunito',sans-serif; font-size:16px; font-weight:800;
    letter-spacing:0.5px; cursor:pointer; transition:all 0.2s;
  }
  .bet-btn.state-bet { background:linear-gradient(135deg,#00e676,#00b248); color:#000; box-shadow:0 4px 20px rgba(0,230,118,0.3); }
  .bet-btn.state-cashout { background:linear-gradient(135deg,#ffd600,#ff8f00); color:#000; box-shadow:0 4px 20px rgba(255,214,0,0.35); animation:pulsebtn 0.8s ease infinite; }
  .bet-btn.state-cancel { background:var(--bg3); color:var(--red); border:1px solid rgba(255,61,87,0.3); }
  .bet-btn.state-wait { background:var(--bg3); color:var(--dim2); cursor:not-allowed; }
  .bet-btn:hover:not(.state-wait) { opacity:0.9; transform:translateY(-1px); }
  .bet-btn:active:not(.state-wait) { transform:translateY(0); }
  @keyframes pulsebtn { 0%,100%{box-shadow:0 4px 20px rgba(255,214,0,0.35)} 50%{box-shadow:0 4px 40px rgba(255,214,0,0.6)} }
  .bet-btn-sub { font-size:11px; font-weight:500; opacity:0.7; display:block; margin-top:1px; font-family:'Space Grotesk',sans-serif; }

  /* Live bets */
  .live-bets { flex:1; overflow:hidden; display:flex; flex-direction:column; min-height:0; }
  .live-bets-header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px 8px; flex-shrink:0; }
  .live-count { font-family:'Space Mono',monospace; font-size:11px; color:var(--green); font-weight:700; }
  .bets-list { flex:1; overflow-y:auto; scrollbar-width:none; padding:0 8px 8px; }
  .bets-list::-webkit-scrollbar { display:none; }
  .bet-row { display:flex; align-items:center; padding:7px 8px; border-radius:6px; gap:8px; transition:background 0.2s; margin-bottom:2px; }
  .bet-row:hover { background:rgba(255,255,255,0.03); }
  .bet-row .user { flex:1; color:var(--dim2); font-family:'Space Mono',monospace; font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bet-row .amount { font-family:'Space Mono',monospace; font-weight:700; color:var(--white); min-width:48px; text-align:right; font-size:11px; }
  .bet-row .mbadge { font-family:'Space Mono',monospace; font-size:11px; font-weight:700; min-width:50px; text-align:right; }
  .mbadge.won { color:var(--green); } .mbadge.flying { color:var(--yellow); } .mbadge.lost { color:var(--red); }

  @media (max-width:700px) {
    .main { grid-template-columns:1fr; grid-template-rows:1fr auto; }
    .side-panel { border-left:none; border-top:1px solid rgba(255,255,255,0.06); max-height:46vh; }
    .live-bets { display:none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="boom">💥 Взрывной </span><span class="chuu">Чууу</span></div>
  <div class="balance-wrap">
    <span class="balance-label">Баланс</span>
    <span class="balance-amount" id="balanceDisplay">1 000.00</span>
    <span style="color:var(--yellow);font-size:13px">₴</span>
  </div>
</header>

<div class="history-bar" id="historyBar"></div>

<div class="main">
  <div class="canvas-area">
    <canvas id="gc"></canvas>

    <div class="mult-display" id="multDisplay">
      <div class="mult-value" id="multValue" style="color:var(--green)">1.00x</div>
      <div class="mult-label" id="multLabel">НАДУВАЄМОСЬ</div>
    </div>

    <div class="crash-overlay" id="crashOverlay">
      <div class="crash-title">💥 БУМ!</div>
      <div class="crash-sub" id="crashSub">@ 1.00x</div>
    </div>

    <div class="waiting-overlay" id="waitOverlay">
      <div class="wait-label">Ставки приймаються</div>
      <div class="wait-countdown" id="waitNum">10</div>
      <div style="font-size:12px;color:var(--dim2);letter-spacing:2px;text-transform:uppercase">секунд</div>
    </div>

    <div class="win-flash" id="winFlash">+0.00 ₴</div>
  </div>

  <div class="side-panel">
    <div class="bet-controls">
      <div class="panel-label">Ставка</div>
      <div class="bet-input-row">
        <button onclick="adjBet(-10)">−</button>
        <input class="bet-input" id="betInput" type="number" value="50" min="1" max="10000">
        <button onclick="adjBet(10)">+</button>
      </div>
      <div class="quick-bets">
        <div class="quick-bet" onclick="setBet(10)">10</div>
        <div class="quick-bet" onclick="setBet(50)">50</div>
        <div class="quick-bet" onclick="setBet(100)">100</div>
        <div class="quick-bet" onclick="setBet(500)">500</div>
      </div>
      <div class="auto-row">
        <span class="auto-label">Авто-вивід</span>
        <input class="auto-input" id="autoInput" type="number" value="2.00" min="1.01" step="0.1">
        <button class="toggle" id="autoToggle" onclick="toggleAuto()"></button>
      </div>
      <button class="bet-btn state-bet" id="mainBtn" data-state="bet" data-queued="" onclick="handleBtn()">
        ЗРОБИТИ СТАВКУ
        <span class="bet-btn-sub" id="btnSub">50 ₴</span>
      </button>
    </div>

    <div class="live-bets">
      <div class="live-bets-header">
        <div class="panel-label">Гравці</div>
        <div class="live-count" id="liveCount">12 гравців</div>
      </div>
      <div class="bets-list" id="betsList"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const S = { WAIT:'wait', FLY:'fly', CRASH:'crash' };
let gs = S.WAIT;
let balance = 1000, bet = 0, cashedOut = false, autoOn = false;
let mult = 1.00, crashAt = 2.0;
let waitSec = 10, waitTimer = null, raf = null;
let startTime = 0;
let history = [], fakePlayers = [];

// Canvas
const cv = document.getElementById('gc');
const cx = cv.getContext('2d');

// Balloon state
let balloonR = 0;       // current radius
let balloonX = 0, balloonY = 0;
let maxR = 0;           // radius at crash
let confetti = [];      // explosion particles
let wobble = 0;         // wobble phase for animation
let shakeX = 0, shakeY = 0; // shake on near-crash

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
function init() {
  resize();
  window.addEventListener('resize', resize);
  document.getElementById('betInput').addEventListener('input', refreshBtnSub);
  genHistory();
  genFake();
  renderFake();
  startWait();
}

function resize() {
  cv.width  = cv.parentElement.clientWidth;
  cv.height = cv.parentElement.clientHeight;
  balloonX  = cv.width  * 0.5;
  balloonY  = cv.height * 0.55;
  maxR      = Math.min(cv.width, cv.height) * 0.38;
}

// ══════════════════════════════════════════
//  CRASH GENERATION
// ══════════════════════════════════════════
function genCrash() {
  const r = Math.random();
  if (r < 0.28) return 1 + Math.random() * 0.5;
  if (r < 0.60) return 1.5 + Math.random() * 1.5;
  if (r < 0.82) return 3   + Math.random() * 7;
  if (r < 0.96) return 10  + Math.random() * 40;
  return 50 + Math.random() * 150;
}

// ══════════════════════════════════════════
//  GAME LOOP
// ══════════════════════════════════════════
function startWait() {
  gs = S.WAIT; mult = 1.00; bet = 0; cashedOut = false;
  crashAt = genCrash(); confetti = [];
  balloonR = 18;

  setMult(1.00, 'var(--dim2)');
  document.getElementById('multLabel').textContent = 'СТАВКИ';
  document.getElementById('multDisplay').style.opacity = '1';
  document.getElementById('crashOverlay').classList.remove('show');
  document.getElementById('waitOverlay').classList.add('show');
  setBtnState('bet');
  shuffleFake(); renderFake();

  waitSec = 10;
  document.getElementById('waitNum').textContent = waitSec;
  clearInterval(waitTimer);
  waitTimer = setInterval(() => {
    waitSec--;
    document.getElementById('waitNum').textContent = waitSec;
    if (waitSec <= 0) { clearInterval(waitTimer); startFly(); }
  }, 1000);

  cancelAnimationFrame(raf);
  drawWait();
}

function drawWait() {
  if (gs !== S.WAIT) return;
  const w = cv.width, h = cv.height;
  cx.clearRect(0,0,w,h);
  drawBg(w,h);

  // pulsing small balloon during wait
  const pulse = 18 + Math.sin(Date.now()/300) * 3;
  wobble += 0.04;
  drawBalloon(balloonX, balloonY, pulse, 1.0);

  raf = requestAnimationFrame(drawWait);
}

function startFly() {
  gs = S.FLY; startTime = performance.now();
  document.getElementById('waitOverlay').classList.remove('show');
  document.getElementById('multLabel').textContent = 'НАДУВАЄМОСЬ';

  // Auto-bet if queued
  if (document.getElementById('mainBtn').dataset.queued === '1') {
    doActivateBet();
    document.getElementById('mainBtn').dataset.queued = '';
  }

  cancelAnimationFrame(raf);
  flyLoop();
}

function flyLoop() {
  const elapsed = (performance.now() - startTime) / 1000;
  mult = Math.round(Math.pow(1.065, elapsed * 10) * 100) / 100;

  if (mult >= crashAt) {
    mult = Math.round(crashAt * 100) / 100;
    doCrash(); return;
  }

  // Color stages
  let color = 'var(--green)';
  if (mult > 2)  color = '#a0e000';
  if (mult > 3)  color = 'var(--yellow)';
  if (mult > 7)  color = '#ffaa00';
  if (mult > 15) color = 'var(--pink)';
  if (mult > 40) color = 'var(--blue)';
  setMult(mult, color);

  // Auto cashout
  if (autoOn && bet > 0 && !cashedOut) {
    const target = parseFloat(document.getElementById('autoInput').value);
    if (mult >= target) cashout();
  }

  // Draw balloon frame
  const prog = Math.min((mult - 1) / (crashAt - 1), 1);
  const r = 18 + prog * (maxR - 18);
  wobble += 0.05;
  // Shake near crash
  if (prog > 0.8) {
    shakeX = (Math.random()-0.5) * (prog-0.8)*30;
    shakeY = (Math.random()-0.5) * (prog-0.8)*20;
  } else { shakeX = 0; shakeY = 0; }

  const w = cv.width, h = cv.height;
  cx.clearRect(0,0,w,h);
  drawBg(w,h);
  drawBalloon(balloonX + shakeX, balloonY + shakeY, r, prog);

  raf = requestAnimationFrame(flyLoop);
}

function doCrash() {
  gs = S.CRASH;
  cancelAnimationFrame(raf);

  document.getElementById('crashOverlay').classList.add('show');
  document.getElementById('crashSub').textContent = `@ ${mult.toFixed(2)}x`;
  document.getElementById('multDisplay').style.opacity = '0';

  // Spawn confetti
  spawnConfetti();
  addHistory(mult);
  updateFakeAfterCrash();
  renderFake();
  setBtnState('wait');

  // Confetti animation
  let frames = 0;
  const animConf = () => {
    const w = cv.width, h = cv.height;
    cx.clearRect(0,0,w,h);
    drawBg(w,h);
    updateConfetti(w, h);
    frames++;
    if (frames < 120) requestAnimationFrame(animConf);
  };
  requestAnimationFrame(animConf);

  setTimeout(startWait, 3500);
}

// ══════════════════════════════════════════
//  BALLOON DRAWING
// ══════════════════════════════════════════
function balloonColor(prog) {
  // Interpolate hue green→yellow→orange→red as prog goes 0→1
  const hue = 120 - prog * 130; // 120=green, -10=red
  const sat = 80 + prog * 15;
  const lit = 50 + prog * 10;
  return `hsl(${hue},${sat}%,${lit}%)`;
}

function drawBalloon(x, y, r, prog) {
  const col = balloonColor(prog);

  // Shadow / glow
  cx.save();
  cx.shadowColor = col;
  cx.shadowBlur = 30 + prog * 40;

  // Wobbly balloon — slightly elliptical with wobble
  const wx = r * (1 + Math.sin(wobble) * 0.04);
  const wy = r * (1 + Math.cos(wobble * 0.7) * 0.04);

  // Main body gradient
  const grad = cx.createRadialGradient(x - wx*0.3, y - wy*0.3, wx*0.1, x, y, wx*1.1);
  grad.addColorStop(0, lighten(col, 40));
  grad.addColorStop(0.5, col);
  grad.addColorStop(1,   darken(col, 30));

  cx.beginPath();
  cx.ellipse(x, y, wx, wy, 0, 0, Math.PI*2);
  cx.fillStyle = grad;
  cx.fill();

  // Shiny highlight
  cx.shadowBlur = 0;
  const hl = cx.createRadialGradient(x - wx*0.35, y - wy*0.35, 0, x - wx*0.35, y - wy*0.35, wx*0.5);
  hl.addColorStop(0, 'rgba(255,255,255,0.45)');
  hl.addColorStop(1, 'rgba(255,255,255,0)');
  cx.beginPath();
  cx.ellipse(x - wx*0.3, y - wy*0.32, wx*0.38, wy*0.32, -0.4, 0, Math.PI*2);
  cx.fillStyle = hl;
  cx.fill();

  // Dark edge outline
  cx.beginPath();
  cx.ellipse(x, y, wx, wy, 0, 0, Math.PI*2);
  cx.strokeStyle = 'rgba(0,0,0,0.25)';
  cx.lineWidth = 2;
  cx.stroke();

  cx.restore();

  // String
  cx.save();
  cx.strokeStyle = 'rgba(255,255,255,0.35)';
  cx.lineWidth = 1.5;
  cx.beginPath();
  cx.moveTo(x, y + wy);
  const cp1x = x + Math.sin(wobble*0.5)*10;
  cx.bezierCurveTo(cp1x, y + wy + r*0.4, x - 10, y + wy + r*0.8, x + Math.sin(wobble)*8, y + wy + r*1.1);
  cx.stroke();
  cx.restore();

  // Text "Чууууу" on balloon
  cx.save();
  const fontSize = Math.max(10, r * 0.32);
  cx.font = `900 ${fontSize}px 'Nunito', sans-serif`;
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillStyle = 'rgba(0,0,0,0.55)';
  cx.fillText('Чууууу', x + 1, y + 1);
  cx.fillStyle = 'rgba(255,255,255,0.92)';
  cx.fillText('Чууууу', x, y);
  cx.restore();

  // Near-crash warning ring
  if (prog > 0.75) {
    const alpha = (prog - 0.75) / 0.25;
    cx.save();
    cx.strokeStyle = `rgba(255,61,87,${alpha * 0.7})`;
    cx.lineWidth = 3 + alpha * 5;
    cx.setLineDash([8, 6]);
    cx.beginPath();
    cx.ellipse(x, y, wx + 8, wy + 8, 0, 0, Math.PI*2);
    cx.stroke();
    cx.restore();
  }
}

function drawBg(w, h) {
  // Subtle grid
  cx.strokeStyle = 'rgba(255,255,255,0.03)';
  cx.lineWidth = 1;
  for (let xi = 0; xi < w; xi += 60) {
    cx.beginPath(); cx.moveTo(xi,0); cx.lineTo(xi,h); cx.stroke();
  }
  for (let yi = 0; yi < h; yi += 50) {
    cx.beginPath(); cx.moveTo(0,yi); cx.lineTo(w,yi); cx.stroke();
  }
}

// ══════════════════════════════════════════
//  CONFETTI EXPLOSION
// ══════════════════════════════════════════
const CONF_COLORS = ['#ff3d57','#ffd600','#00e676','#ff6bc8','#448aff','#ff9800','#e040fb'];

function spawnConfetti() {
  confetti = [];
  for (let i = 0; i < 120; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 4 + Math.random() * 10;
    confetti.push({
      x: balloonX, y: balloonY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      r: 4 + Math.random() * 6,
      color: CONF_COLORS[Math.floor(Math.random()*CONF_COLORS.length)],
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random()-0.5) * 0.3,
      life: 1.0,
      isRect: Math.random() > 0.5
    });
  }
}

function updateConfetti(w, h) {
  confetti.forEach(p => {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.25; // gravity
    p.vx *= 0.98;
    p.rot += p.rotV;
    p.life -= 0.012;

    cx.save();
    cx.globalAlpha = Math.max(0, p.life);
    cx.translate(p.x, p.y);
    cx.rotate(p.rot);
    cx.fillStyle = p.color;
    if (p.isRect) {
      cx.fillRect(-p.r/2, -p.r*1.5, p.r, p.r*3);
    } else {
      cx.beginPath();
      cx.arc(0, 0, p.r, 0, Math.PI*2);
      cx.fill();
    }
    cx.restore();
  });
}

// ══════════════════════════════════════════
//  COLOR HELPERS
// ══════════════════════════════════════════
function lighten(hsl, amt) {
  return hsl.replace(/(\d+)%\)/, (_, l) => `${Math.min(100, +l + amt)}%)`);
}
function darken(hsl, amt) {
  return hsl.replace(/(\d+)%\)/, (_, l) => `${Math.max(0, +l - amt)}%)`);
}

// ══════════════════════════════════════════
//  PLAYER ACTIONS
// ══════════════════════════════════════════
function handleBtn() {
  const btn = document.getElementById('mainBtn');
  const st = btn.dataset.state;
  if      (st === 'bet')          { gs === S.FLY ? doActivateBet() : queueBet(btn); }
  else if (st === 'cashout')      { cashout(); }
  else if (st === 'cancel-queue') { btn.dataset.queued=''; setBtnState('bet'); }
}

function queueBet(btn) {
  const amt = getBet();
  if (amt > balance) return shake(btn);
  btn.dataset.queued = '1';
  btn.dataset.state  = 'cancel-queue';
  btn.className = 'bet-btn state-cancel';
  btn.innerHTML = 'В ЧЕРЗІ <span class="bet-btn-sub">Старт у наступному раунді</span>';
}

function doActivateBet() {
  const amt = getBet();
  if (amt > balance) return shake(document.getElementById('mainBtn'));
  if (bet > 0) return;
  balance -= amt; bet = amt;
  updBalance(); setBtnState('cashout');
}

function cashout() {
  if (!bet || cashedOut || gs !== S.FLY) return;
  cashedOut = true;
  const win = bet * mult;
  balance += win; updBalance();
  showWin(`+${(win-bet).toFixed(2)} ₴  (${mult.toFixed(2)}x)`);
  setBtnState('wait');
}

function getBet()  { return Math.max(1, parseFloat(document.getElementById('betInput').value)||50); }
function adjBet(d) { document.getElementById('betInput').value = Math.max(1,(parseFloat(document.getElementById('betInput').value)||0)+d); refreshBtnSub(); }
function setBet(v) { document.getElementById('betInput').value = v; refreshBtnSub(); }
function toggleAuto() { autoOn=!autoOn; document.getElementById('autoToggle').classList.toggle('on',autoOn); }

// ══════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════
function setBtnState(s) {
  const btn = document.getElementById('mainBtn');
  btn.dataset.state = s; btn.dataset.queued = '';
  if (s==='bet') {
    btn.className='bet-btn state-bet';
    btn.innerHTML=`ЗРОБИТИ СТАВКУ<span class="bet-btn-sub">${getBet()} ₴</span>`;
  } else if (s==='cashout') {
    btn.className='bet-btn state-cashout';
    btn.innerHTML=`ВИВЕСТИ 🎈<span class="bet-btn-sub" id="cSub">${bet.toFixed(2)} ₴</span>`;
    const up=()=>{ if(gs!==S.FLY||cashedOut)return; const s=document.getElementById('cSub'); if(s)s.textContent=(bet*mult).toFixed(2)+' ₴'; requestAnimationFrame(up); };
    requestAnimationFrame(up);
  } else if (s==='wait') {
    btn.className='bet-btn state-wait';
    btn.innerHTML=`ЧЕКАЄМО... <span class="bet-btn-sub">Наступний раунд</span>`;
  }
}
function refreshBtnSub() { if(document.getElementById('mainBtn').dataset.state==='bet') setBtnState('bet'); }
function setMult(v,col)  { const e=document.getElementById('multValue'); e.textContent=v.toFixed(2)+'x'; e.style.color=col; }
function updBalance()    { document.getElementById('balanceDisplay').textContent=balance.toFixed(2); }
function showWin(txt)    { const e=document.getElementById('winFlash'); e.textContent=txt; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),2500); }
function shake(el)       { el.style.animation='boomShake 0.4s ease'; setTimeout(()=>el.style.animation='',400); }

// ══════════════════════════════════════════
//  HISTORY
// ══════════════════════════════════════════
function genHistory() {
  [1.22,5.67,1.01,3.44,22.1,1.78,8.9,1.05,2.33,44.2,1.11,6.7].forEach(v=>addHistory(v));
}
function addHistory(v) {
  history.unshift(v); if(history.length>20) history.pop(); renderHistory();
}
function renderHistory() {
  document.getElementById('historyBar').innerHTML = history.map(v=>{
    let c='hist-low';
    if(v>=2&&v<5) c='hist-mid'; else if(v>=5&&v<20) c='hist-high'; else if(v>=20) c='hist-epic';
    return `<div class="hist-pill ${c}">${v.toFixed(2)}x</div>`;
  }).join('');
}

  document.getElementById('liveCount').textContent=(fakePlayers.length+(bet>0?1:0))+' гравців';

function updateFakeAfterCrash() {
  fakePlayers.forEach(p=>{
    if(p.co) return;
    if(Math.random()<0.4){ p.co=(1+Math.random()*(mult-1)).toFixed(2); p.status='won'; }
    else p.status='lost';
  });
}
function renderFake() {
  let rows=fakePlayers.map(p=>{
    let b='...', c='flying';
    if(p.status==='won'){b=p.co+'x';c='won';}
    if(p.status==='lost'){b='💥';c='lost';}
    return `<div class="bet-row"><span class="user">${p.name}</span><span class="amount">${p.bet}₴</span><span class="mbadge ${c}">${b}</span></div>`;
  });
  if(bet>0){
    const b=cashedOut?`${mult.toFixed(2)}x`:(gs===S.CRASH?'💥':'...');
    const c=cashedOut?'won':(gs===S.CRASH?'lost':'flying');
    rows.unshift(`<div class="bet-row" style="background:rgba(0,230,118,0.06);border-left:2px solid var(--green)"><span class="user" style="color:var(--green)">Ви</span><span class="amount">${bet}₴</span><span class="mbadge ${c}">${b}</span></div>`);
  }
  document.getElementById('betsList').innerHTML=rows.join('');
}
